<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>13L X ROCKY | PLASMA ENGINE</title>
    
    <style>
        /* =========================================================
           1. FONTS & GLOBAL VARS
           ========================================================= */
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;900&family=Share+Tech+Mono&display=swap');
        
        :root { 
            --neon-green: #00f060; --neon-red: #ff2a40; --neon-gold: #ffd700;
            --glass-bg: rgba(6, 12, 9, 0.95);
        }
        
        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Rajdhani', sans-serif;}

        /* GAME IFRAME (100% SCREEN BACKGROUND) */
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }

        /* =========================================================
           2. DRAGGABLE FLOATING 13L ICON (SLIGHTLY BIGGER)
           ========================================================= */
        #floatingIcon {
            position: absolute; top: 15%; left: 15px; width: 60px; height: 60px; /* Bada Icon */
            background: radial-gradient(circle at top left, #1a2a20, #000); 
            border: 2px solid var(--neon-green); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center;
            color: var(--neon-green); font-size: 20px; font-weight: 900; 
            box-shadow: 0 0 20px rgba(0, 240, 96, 0.4), inset 0 0 10px rgba(0,240,96,0.2);
            z-index: 9999; cursor: grab; font-family: 'Share Tech Mono'; 
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #floatingIcon:active { cursor: grabbing; transform: scale(0.9); box-shadow: 0 0 30px rgba(0,240,96,0.8); }

        /* =========================================================
           3. MOD MENU POPUP (BIGGER & WIDER UI)
           ========================================================= */
        #modMenu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7);
            width: 360px; /* Badi Width */
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 240, 96, 0.3); border-radius: 12px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,240,96,0.05);
            z-index: 10000; display: none; opacity: 0; flex-direction: column; padding: 25px; /* Zyada Padding */
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #modMenu.active { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .menu-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(0,240,96,0.3); padding-bottom: 15px; margin-bottom: 20px; }
        .menu-title { color: var(--neon-green); font-size: 24px; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 10px rgba(0,240,96,0.4);}
        .close-btn { color: var(--neon-red); font-weight: 900; font-size: 18px; cursor: pointer; border: 1px solid var(--neon-red); padding: 4px 10px; border-radius: 6px; transition: 0.2s;}
        .close-btn:active { background: var(--neon-red); color: #000; }

        .timer-row { display: flex; justify-content: space-between; font-family: 'Share Tech Mono'; font-size: 15px; color: #ccc; margin-bottom: 20px; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 6px; border: 1px solid #222; }
        #displayTimer { color: var(--neon-red); font-weight: bold; letter-spacing: 1px; }

        .input-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .input-row input { flex: 1; padding: 15px; font-family: 'Share Tech Mono'; font-size: 18px; text-align: center; background: rgba(0,0,0,0.8); border: 1px solid rgba(0,240,96,0.4); color: var(--neon-green); border-radius: 6px; outline: none; transition: 0.3s;}
        .input-row input:focus { border-color: var(--neon-green); box-shadow: inset 0 0 10px rgba(0,240,96,0.2); }

        .btn-exec { width: 100%; padding: 16px; background: var(--neon-green); color: #000; border: none; font-family: 'Rajdhani'; font-weight: 900; font-size: 20px; letter-spacing: 2px; border-radius: 6px; cursor: pointer; box-shadow: 0 0 15px rgba(0,240,96,0.3); transition: 0.2s;}
        .btn-exec:active { transform: scale(0.96); box-shadow: 0 0 25px rgba(0,240,96,0.6); }

        .result-display { margin-top: 20px; text-align: center; font-size: 26px; font-weight: 900; color: #555; font-family: 'Share Tech Mono'; letter-spacing: 2px; background: #000; padding: 12px; border-radius: 6px; border: 1px dashed #333; transition: 0.3s;}

        /* =========================================================
           4. API RESULT ANIMATIONS (WIN/LOSS/JACKPOT)
           ========================================================= */
        .result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.92); z-index: 99999; display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .result-card { padding: 35px; border-radius: 12px; text-align: center; width: 90%; max-width: 400px; background: #050a07; opacity: 0; transform: scale(0.5); }
        
        .card-win { border: 2px solid var(--neon-green); box-shadow: 0 0 50px rgba(0,240,96,0.4); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .card-loss { border: 2px solid var(--neon-red); box-shadow: 0 0 50px rgba(255,42,64,0.4); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .card-jackpot { border: 3px solid var(--neon-gold); background: #1a1500; animation: popIn 0.4s forwards, pulseGold 1.5s infinite; }

        .anim-title { font-size: 48px; font-weight: 900; margin: 0 0 15px 0; letter-spacing: 4px; }
        .title-win { color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); }
        .title-loss { color: var(--neon-red); text-shadow: 0 0 20px var(--neon-red); }
        .title-jackpot { color: var(--neon-gold); text-shadow: 0 0 30px var(--neon-gold); }

        .anim-details { font-family: 'Share Tech Mono'; font-size: 16px; color: #ccc; text-align: left; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 6px; border: 1px dashed #444;}
        .anim-details div { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 8px;}
        .anim-details span { font-weight: bold; font-size: 18px; color: #fff;}

        .btn-close-anim { margin-top: 30px; padding: 15px; font-family: 'Rajdhani'; font-weight: 900; font-size: 18px; background: transparent; border: 2px solid #fff; color: #fff; cursor: pointer; border-radius: 6px; width: 100%; transition: 0.2s; letter-spacing: 1px;}
        .btn-close-anim:active { background: #fff; color: #000; }
        
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulseGold { 0% { box-shadow: 0 0 30px rgba(255,215,0,0.4); } 50% { box-shadow: 0 0 80px rgba(255, 215, 0, 0.8); } 100% { box-shadow: 0 0 30px rgba(255,215,0,0.4); } }
    </style>
</head>
<body>

    <iframe src="https://draw.ar-lottery01.com/"></iframe>

    <div id="floatingIcon">13L</div>

    <div id="modMenu">
        <div class="menu-header">
            <div class="menu-title">13L ENGINE</div>
            <div class="close-btn" onclick="toggleMenu()">HIDE</div>
        </div>

        <div class="timer-row">
            <div>NODE: <span id="displayPeriod">SYNCING...</span></div>
            <div id="displayTimer">00:00</div>
        </div>

        <div class="input-row">
            <input type="number" id="num1" placeholder="N-1" min="0" max="9">
            <input type="number" id="num2" placeholder="N-2" min="0" max="9">
        </div>

        <button class="btn-exec" onclick="runHackEngine()">EXECUTE BYPASS</button>

        <div class="result-display" id="predictionDisplay">WAITING</div>
    </div>

    <div id="resultScreen" class="result-overlay">
        <div id="resultCardBox" class="result-card">
            <h1 id="animTitle" class="anim-title">RESULT</h1>
            <div class="anim-details">
                <div>PERIOD <span>#<span id="animPeriod">---</span></span></div>
                <div>PREDICTION <span id="animPred">---</span></div>
                <div>ACTUAL RESULT <span id="animActual">---</span></div>
            </div>
            <button class="btn-close-anim" onclick="closeAnimation()">CONTINUE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFdvXN8SAy77EDQp5HNykO5z2Wa0W8sb0", authDomain: "bdgrocky.firebaseapp.com",
            databaseURL: "https://bdgrocky-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "bdgrocky"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        let currentActivePeriod = ""; let currentActivePrediction = ""; let isWaitingForAPI = false;

        // --- 1. SMOOTH DRAG LOGIC ---
        const icon = document.getElementById('floatingIcon');
        let isDragging = false, startX, startY;

        const startDrag = (e) => {
            isDragging = true;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startX = clientX - icon.offsetLeft; startY = clientY - icon.offsetTop;
            icon.style.transition = 'none';
        };

        const moveDrag = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let newX = clientX - startX; let newY = clientY - startY;
            
            let maxW = window.innerWidth - 64; let maxH = window.innerHeight - 64;
            if(newX < 0) newX = 0; if(newY < 0) newY = 0;
            if(newX > maxW) newX = maxW; if(newY > maxH) newY = maxH;

            icon.style.left = `${newX}px`; icon.style.top = `${newY}px`;
        };

        const stopDrag = () => { isDragging = false; icon.style.transition = 'transform 0.2s, box-shadow 0.2s'; };

        icon.addEventListener('mousedown', startDrag); window.addEventListener('mousemove', moveDrag); window.addEventListener('mouseup', stopDrag);
        icon.addEventListener('touchstart', startDrag, {passive: false}); window.addEventListener('touchmove', moveDrag, {passive: false}); window.addEventListener('touchend', stopDrag);

        // --- 2. MOD MENU TOGGLE ---
        window.toggleMenu = () => {
            const menu = document.getElementById('modMenu');
            if(menu.classList.contains('active')) {
                menu.classList.remove('active');
                setTimeout(() => {
                    let d = document.getElementById('predictionDisplay');
                    d.innerText = "WAITING"; d.style.color = "#555"; d.style.borderColor = "#333"; d.style.textShadow = "none";
                }, 300);
            } else {
                menu.classList.add('active');
            }
        };

        let lastTime = 0;
        icon.addEventListener('mousedown', () => lastTime = Date.now());
        icon.addEventListener('touchstart', () => lastTime = Date.now());
        icon.addEventListener('mouseup', () => { if(Date.now() - lastTime < 200) toggleMenu(); });
        icon.addEventListener('touchend', () => { if(Date.now() - lastTime < 200) toggleMenu(); });


        // --- 3. TIMER & API TRIGGER ---
        setInterval(() => {
            let now = new Date(); let mins = now.getUTCMinutes(); let hrs = now.getUTCHours();
            let periodStr = `${now.getUTCFullYear()}${String(now.getUTCMonth()+1).padStart(2,'0')}${String(now.getUTCDate()).padStart(2,'0')}1000${10001 + (hrs * 60) + mins}`;
            let remSec = 60 - now.getUTCSeconds(); if(remSec === 60) remSec = 0;
            
            document.getElementById('displayPeriod').innerText = periodStr; 
            document.getElementById('displayTimer').innerText = `00:${String(remSec).padStart(2,'0')}`;

            if(remSec === 0 && currentActivePrediction !== "" && !isWaitingForAPI) {
                isWaitingForAPI = true;
                setTimeout(() => { verifyWithGameAPI(currentActivePeriod, currentActivePrediction); }, 2000); 
            }
        }, 1000);

        // --- 4. EXECUTION ENGINE (FAST DB PULL) ---
        window.runHackEngine = async () => {
            let n1 = document.getElementById('num1').value; let n2 = document.getElementById('num2').value;
            let display = document.getElementById('predictionDisplay');
            if(n1 === "" || n2 === "") return alert("Enter N-1 and N-2");

            display.innerText = "FETCHING..."; 
            display.style.color = "var(--neon-gold)";
            display.style.borderColor = "var(--neon-gold)";
            
            try {
                let snap = await get(ref(db, `patterns/${n1}-${n2}`));
                setTimeout(() => {
                    if(snap.exists() && !snap.val().includes("UNSET")) {
                        let predictionResult = snap.val();
                        display.innerText = predictionResult; 
                        display.style.color = "var(--neon-green)";
                        display.style.borderColor = "var(--neon-green)";
                        display.style.textShadow = "0 0 10px rgba(0,240,96,0.5)";
                        
                        currentActivePeriod = document.getElementById('displayPeriod').innerText;
                        currentActivePrediction = predictionResult; 
                        isWaitingForAPI = false;
                        
                        setTimeout(() => { toggleMenu(); }, 2000);
                    } else {
                        display.innerText = "UNSET"; 
                        display.style.color = "var(--neon-red)";
                        display.style.borderColor = "var(--neon-red)";
                    }
                }, 400); 
            } catch(e) { display.innerText = "ERROR"; display.style.color = "var(--neon-red)"; }
        };

        // --- 5. API ENGINE & ANIMATIONS ---
        window.closeAnimation = () => { document.getElementById('resultScreen').style.display = 'none'; }

        function triggerAnimation(type, period, prediction, actualResult, number) {
            const screen = document.getElementById('resultScreen'); const card = document.getElementById('resultCardBox'); const title = document.getElementById('animTitle');
            document.getElementById('animPeriod').innerText = period.slice(-4);
            document.getElementById('animPred').innerText = prediction; document.getElementById('animActual').innerText = `${actualResult} [${number}]`;

            card.className = "result-card"; title.className = "anim-title";
            if(type === 'JACKPOT') { card.classList.add('card-jackpot'); title.classList.add('title-jackpot'); title.innerText = "JACKPOT!"; } 
            else if(type === 'WIN') { card.classList.add('card-win'); title.classList.add('title-win'); title.innerText = "VICTORY!"; } 
            else if(type === 'LOSS') { card.classList.add('card-loss'); title.classList.add('title-loss'); title.innerText = "SYSTEM FAIL"; }
            screen.style.display = 'flex';
        }

        async function verifyWithGameAPI(periodToVerify, predictedValue) {
            try {
                const apiUrl = `https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json`; 
                let response = await fetch(apiUrl); let data = await response.json();
                let historyList = data.data || data.list || data.items || data; 

                let periodData = historyList.find(item => item.issueNumber == periodToVerify || item.period == periodToVerify || item.IssueNumber == periodToVerify);
                if (!periodData) { setTimeout(() => verifyWithGameAPI(periodToVerify, predictedValue), 3000); return; }

                let actualResult = ""; let winningNumber = periodData.number !== undefined ? periodData.number : (periodData.Number !== undefined ? periodData.Number : 0);
                if (periodData.size || periodData.Size) { actualResult = (periodData.size || periodData.Size).toUpperCase(); } 
                else { actualResult = (winningNumber >= 5) ? "BIG" : "SMALL"; }
                
                let cleanPrediction = predictedValue.toUpperCase().includes("BIG") ? "BIG" : "SMALL";

                if (cleanPrediction === actualResult) {
                    let isJackpot = (winningNumber == 0 || winningNumber == 5);
                    if(isJackpot) triggerAnimation('JACKPOT', periodToVerify, predictedValue, actualResult, winningNumber);
                    else triggerAnimation('WIN', periodToVerify, predictedValue, actualResult, winningNumber);
                } else triggerAnimation('LOSS', periodToVerify, predictedValue, actualResult, winningNumber);

                currentActivePrediction = ""; isWaitingForAPI = false;
            } catch (error) { console.error(error); isWaitingForAPI = false; }
        }
    </script>
</body>
</html>
