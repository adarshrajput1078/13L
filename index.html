<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>13L X ROCKY | VIP PREDICTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Rajdhani:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --13l-bg: #1c1c1e; --13l-red: #ea2b2b; --13l-gold: #fcc333; --text-white: #f5f5f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { height: 100%; font-family: 'Poppins', sans-serif; background-color: #000; color: var(--text-white); overflow: hidden; display: flex; flex-direction: column; }

        #top-panel { height: 15%; min-height: 140px; width: 100%; background: linear-gradient(180deg, #121212 0%, var(--13l-bg) 100%); border-bottom: 1.5px solid rgba(234, 43, 43, 0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; position: relative; padding: 4px 8px; box-shadow: 0 4px 25px rgba(0, 0, 0, 0.8); }
        #bottom-panel { height: 85%; width: 100%; background-color: #000; position: relative; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        .top-header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; border-bottom: 1px dashed rgba(252, 195, 51, 0.15); padding-bottom: 3px;}
        .logo-text { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 900; color: var(--13l-red); text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 8px rgba(234, 43, 43, 0.6);}
        .service-btn { background: linear-gradient(180deg, #3a3a3c 0%, #2c2c2e 100%); color: var(--13l-gold); font-size: 9px; font-weight: 800; padding: 3px 10px; border-radius: 4px; border: 1px solid rgba(252, 195, 51, 0.3); cursor: pointer;}
        
        .tool-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 4px; padding: 0 5px; }
        .info-row { display: flex; justify-content: space-between; font-size: 10px; background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(234, 43, 43, 0.15); font-family: 'Share Tech Mono', monospace;}
        .info-row span { color: var(--13l-gold); font-weight: 800; font-family: 'Rajdhani', sans-serif; font-size: 13px; letter-spacing: 0.5px;}
        
        .input-row { display: flex; gap: 6px; align-items: center; }
        input { flex: 1; padding: 7px; border: 1px solid #2c2c2e; border-radius: 4px; text-align: center; font-size: 13px; font-weight: 800; background: #111112; color: var(--13l-gold); outline: none;}
        input:focus { border-color: var(--13l-red); box-shadow: 0 0 8px rgba(234, 43, 43, 0.3); }
        button.action-btn { padding: 7px 12px; font-size: 13px; font-family: 'Rajdhani', sans-serif; font-weight: 900; cursor: pointer; border-radius: 4px; border: none; background: linear-gradient(180deg, var(--13l-red) 0%, #991212 100%); color: #fff; width: 30%; }
        button.action-btn:disabled { background: #222; color: #555; }
        
        .result-box { text-align: center; font-size: 14px; font-weight: 900; color: #555; background: #0d0d0e; padding: 5px; border-radius: 4px; border: 1px solid #1c1c1e; flex-grow: 1;}

        /* COPY SIGNAL BUTTON */
        .copy-btn { width: 100%; padding: 6px; font-size: 12px; font-family: 'Rajdhani', sans-serif; font-weight: 900; cursor: pointer; border-radius: 4px; border: 1px dashed var(--13l-gold); background: #111; color: var(--13l-gold); text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;}
        .copy-btn:active { background: var(--13l-gold); color: #000; }

        .auth-container { text-align: center; width: 100%; max-width: 500px; padding: 0 5px; }
        .auth-container h3 { margin: 2px 0 8px 0; font-size: 13px; color: #8e8e93; font-weight: 700; }
        .auth-container h3 span { color: var(--13l-red); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.94); z-index: 99999; display: none; justify-content: center; align-items: center; }
        .modal-box { background: linear-gradient(180deg, #1c1c1e 0%, #0a0a0b 100%); border: 1px solid var(--13l-red); padding: 25px 20px; border-radius: 8px; text-align: center; width: 85%; max-width: 320px; }
        .modal-box h4 { color: var(--13l-red); font-size: 18px; font-weight: 900;}
        .modal-box p { font-size: 12px; color: #c7c7cc; margin-bottom: 20px; }
        .btn-close { background: transparent; border: 1px solid var(--13l-red); color: var(--13l-red); padding: 8px 15px; border-radius: 4px; font-weight: 800; cursor: pointer; width: 100%; }
        .btn-urgent { background: linear-gradient(90deg, var(--13l-red), #990000); border: none; color: #fff; padding: 10px 15px; border-radius: 4px; font-weight: 800; cursor: pointer; margin-top: 10px; display: none; width: 100%;}

        /* 🔥 MINI SCREEN FOR WIN/LOSS 🔥 */
        #miniAnimScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 12, 0.98); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(4px); animation: fadeIn 0.3s forwards;}
        .mini-title { font-family: 'Rajdhani', sans-serif; font-size: 26px; font-weight: 900; margin: 0; letter-spacing: 2px; }
        .mini-details { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: #ccc; margin-top: 4px; text-align: center; line-height: 1.6; font-weight: bold;}
        .mini-details span { font-size: 13px; font-weight: 900; }
        .mini-close { font-size: 9px; color: #666; margin-top: 6px; cursor: pointer; font-weight: bold;}

        /* 🔥 MASSIVE CRICKET-STYLE JACKPOT SCREEN 🔥 */
        #jackpotScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 99999999; display: none; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .jackpot-bg { position: absolute; width: 150vw; height: 150vw; background: radial-gradient(circle, rgba(252, 195, 51, 0.4) 0%, transparent 60%); animation: fireSpin 4s linear infinite; z-index: -1; }
        .jackpot-title { font-family: 'Rajdhani', sans-serif; font-size: 55px; font-weight: 900; color: var(--13l-gold); text-shadow: 0 0 30px var(--13l-gold), 0 0 60px #fff; text-align: center; line-height: 1.1; animation: smashZoom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .jackpot-subtitle { font-size: 24px; color: #fff; text-shadow: 0 0 10px #fff; display: block; margin-top: 10px;}

        @keyframes fireSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes smashZoom { 0% { transform: scale(5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="uidModal" class="modal-overlay">
        <div class="modal-box">
            <h4 id="modalTitle">SYSTEM ALERT</h4>
            <p id="modalMsg">Processing...</p>
            <button id="modalActionBtn" class="btn-close" onclick="closeModal()">OKAY</button>
            <button id="urgentBtn" class="btn-urgent" onclick="sendUrgentRequest()">⚡ URGENTLY PING</button>
        </div>
    </div>

    <!-- ⚡ CRICKET STYLE JACKPOT SCREEN (FULL SCREEN) -->
    <div id="jackpotScreen">
        <div class="jackpot-bg"></div>
        <h1 class="jackpot-title">JACKPOT WIN<br><span class="jackpot-subtitle">BY ROCKY</span></h1>
    </div>

    <!-- 15% TOP PANEL -->
    <div id="top-panel">
        
        <!-- ⚡ FORMATTED RESULT SCREEN (INSIDE TOP PANEL) -->
        <div id="miniAnimScreen">
            <h1 id="miniTitle" class="mini-title">🏆 WIN 🏆</h1>
            <div id="miniDetails" class="mini-details">
                <!-- Data injected by JS -->
            </div>
            <div class="mini-close" onclick="closeMiniScreen()">[ TAP TO CLOSE ]</div>
        </div>

        <div class="top-header">
            <div class="logo-text">13L X ROCKY</div>
            <button class="service-btn" onclick="openSupport()">🎧 SYSTEM SUPPORT</button>
        </div>
        <div id="authScreen" class="auth-container">
            <h3>VIP ACCOUNT <span>VERIFICATION</span></h3>
            <div class="input-row">
                <input type="number" id="uidInput" placeholder="Enter Platform UID">
                <button id="authBtn" class="action-btn" onclick="checkUID()">VERIFY</button>
            </div>
        </div>
        <div id="toolScreen" class="tool-container hidden">
            <div class="info-row">
                <div>LIVE PERIOD: <span id="displayPeriod">SYNCING...</span></div>
                <div>TIME: <span id="displayTimer" style="color:var(--13l-red);">00:00</span></div>
            </div>
            <div class="input-row" style="margin-top: 2px;">
                <input type="number" id="num1" placeholder="N-1" min="0" max="9">
                <input type="number" id="num2" placeholder="N-2" min="0" max="9">
                <button id="analyzeBtn" class="action-btn" onclick="runExploit()">GET RESULT</button>
                <div id="predictionDisplay" class="result-box">WAITING...</div>
            </div>
            <!-- COPY SIGNAL BUTTON -->
            <button class="copy-btn" onclick="copySignal()">📋 COPY SIGNAL</button>
        </div>
    </div>

    <!-- 85% GAME SCREEN -->
    <div id="bottom-panel">
        <iframe id="gameIframe" src="https://bdg5.cc"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFdvXN8SAy77EDQp5HNykO5z2Wa0W8sb0",
            authDomain: "bdgrocky.firebaseapp.com",
            databaseURL: "https://bdgrocky-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "bdgrocky"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentActivePrediction = ""; let currentActivePeriod = ""; let isWaitingForAPI = false; let currentFailedUid = "";
        let dynamicSupportLink = "https://t.me/";

        onValue(ref(db, 'settings/support_link'), snap => { if(snap.exists()) dynamicSupportLink = snap.val(); });
        onValue(ref(db, 'settings/active_link'), snap => { if(snap.exists() && snap.val() !== "") document.getElementById('gameIframe').src = snap.val().trim(); });
        window.openSupport = () => window.open(dynamicSupportLink, '_blank');

        function showModal(title, msg, isPendingState = false) {
            document.getElementById('modalTitle').innerText = title; document.getElementById('modalMsg').innerHTML = msg;
            let closeBtn = document.getElementById('modalActionBtn'); let urgentBtn = document.getElementById('urgentBtn');
            if(isPendingState) { closeBtn.innerText = "WAITING APPROVAL..."; urgentBtn.style.display = "block"; } 
            else { closeBtn.innerText = "OKAY"; closeBtn.onclick = () => document.getElementById('uidModal').style.display = 'none'; urgentBtn.style.display = "none"; }
            document.getElementById('uidModal').style.display = 'flex';
        }

        function getDeviceID() {
            let did = localStorage.getItem('vip_device_id');
            if(!did) { did = 'DEV-' + Math.random().toString(36).substr(2, 9); localStorage.setItem('vip_device_id', did); }
            return did;
        }

        window.checkUID = async () => {
            let uid = document.getElementById('uidInput').value.trim(); 
            if(!/^\d{5,12}$/.test(uid)) return showModal("❌ INVALID UID", "UID must be between 5 to 12 numbers.", false);
            let btn = document.getElementById('authBtn'); btn.innerText = "..."; btn.disabled = true;

            try {
                let approvedSnap = await get(ref(db, 'approved_uids/' + uid));
                if(approvedSnap.exists()) {
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('toolScreen').classList.remove('hidden');
                    startTimerEngine(); return;
                }
                currentFailedUid = uid;
                await set(ref(db, 'uid_requests/' + uid), { uid: uid, deviceId: getDeviceID(), status: "pending", timestamp: Date.now(), urgent: false });
                btn.innerText = "VERIFY"; btn.disabled = false;
                showModal("⏳ REQUEST SENT", `UID [ ${uid} ] request sent. Please wait for admin approval.`, true);
            } catch (error) { btn.innerText = "VERIFY"; btn.disabled = false; showModal("ERROR", "Connection failed. Try again.", false); }
        };

        function startTimerEngine() {
            setInterval(() => {
                let now = new Date();
                let hrs = now.getHours(); let mins = now.getMinutes();
                currentActivePeriod = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}1000${10001 + (hrs * 60) + mins}`;
                let remSec = 60 - now.getSeconds(); if(remSec === 60) remSec = 0;
                
                document.getElementById('displayPeriod').innerText = currentActivePeriod;
                document.getElementById('displayTimer').innerText = `00:${String(remSec).padStart(2,'0')}`;

                if(remSec === 0 && currentActivePrediction !== "" && !isWaitingForAPI) {
                    isWaitingForAPI = true; 
                    triggerAnimationEngine(currentActivePeriod, currentActivePrediction); 
                }
            }, 1000);
        }

        window.runExploit = async () => {
            let n1 = document.getElementById('num1').value; let n2 = document.getElementById('num2').value;
            let resBox = document.getElementById('predictionDisplay'); let btn = document.getElementById('analyzeBtn');
            if(n1 === "" || n2 === "") return showModal("WARNING", "Please enter N-1 and N-2.", false);

            btn.disabled = true; resBox.innerText = "ANALYZING..."; resBox.style.color = "#444";
            
            try {
                let snap = await get(ref(db, `patterns/${n1}-${n2}`));
                setTimeout(() => {
                    btn.disabled = false;
                    if(snap.exists() && !snap.val().includes("UNSET")) {
                        currentActivePrediction = snap.val(); 
                        resBox.innerText = currentActivePrediction;
                        resBox.style.color = "var(--13l-gold)";
                        isWaitingForAPI = false;
                    } else { resBox.innerText = "NOT FOUND"; resBox.style.color = "var(--13l-red)"; }
                }, 700);
            } catch(e) { btn.disabled = false; resBox.innerText = "ERROR"; }
        };

        // 🔥 TELEGRAM STYLE COPY SIGNAL 🔥
        window.copySignal = () => {
            let period = document.getElementById('displayPeriod').innerText;
            let pred = document.getElementById('predictionDisplay').innerText;
            let time = document.getElementById('displayTimer').innerText;
            
            if(pred === "WAITING..." || pred === "NOT FOUND" || pred === "ANALYZING...") {
                alert("Please GET RESULT first before copying the signal!"); return;
            }

            let signalText = `🏆 ANSWER 🏆\n13L Game\nWinGo 1 Minute\nPeriod: ${period}\nPrediction: ${pred}\nTime Remaining: ${time}\n\nPowered by: ROCKY BHAI`;
            
            navigator.clipboard.writeText(signalText).then(() => {
                alert("Signal Copied Successfully!");
            });
        };

        window.closeMiniScreen = () => { document.getElementById('miniAnimScreen').style.display = 'none'; }

        // 🔥 DYNAMIC POPUP ENGINE 🔥
        function showResultPopup(type, period, prediction, actualResult, number) {
            let shortPeriod = String(period).slice(-4);
            
            if(type === 'JACKPOT') {
                const jpScreen = document.getElementById('jackpotScreen');
                jpScreen.style.display = 'flex';
                setTimeout(() => { jpScreen.style.display = 'none'; }, 3000);
            } 
            else {
                const miniScreen = document.getElementById('miniAnimScreen');
                const mTitle = document.getElementById('miniTitle');
                const mDetails = document.getElementById('miniDetails');
                
                if(type === 'WIN') {
                    mTitle.innerText = "🏆 WIN 🏆";
                    mTitle.style.color = "#34c759";
                    mTitle.style.textShadow = "0 0 10px #34c759";
                    mDetails.innerHTML = `PERIOD NUMBER: ${shortPeriod}<br>RESULT: <span style="color:#34c759">${actualResult} [${number}]</span><br>PREDICTION: ${prediction}`;
                } else {
                    mTitle.innerText = "❌ LOSS ❌";
                    mTitle.style.color = "var(--13l-red)";
                    mTitle.style.textShadow = "0 0 10px var(--13l-red)";
                    mDetails.innerHTML = `PERIOD NUMBER: ${shortPeriod}<br>RESULT: <span style="color:var(--13l-red)">${actualResult} [${number}]</span><br>PREDICTION: ${prediction}`;
                }
                
                miniScreen.style.display = 'flex';
                setTimeout(() => { miniScreen.style.display = 'none'; }, 4000);
            }
        }

        async function triggerAnimationEngine(pVerify, pValue) {
            try {
                let res = await fetch(`https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json`); 
                let data = await res.json(); 
                let latestItem = (data.data || data.list || data.items || data)[0];
                
                let actual = latestItem.size ? latestItem.size.toUpperCase() : (parseInt(latestItem.number) >= 5 ? "BIG" : "SMALL");
                let num = latestItem.number !== undefined ? latestItem.number : 0;
                let cleanPred = pValue.toUpperCase().includes("BIG") ? "BIG" : "SMALL";
                
                if(cleanPred === actual) {
                    if(num == 0 || num == 5) showResultPopup('JACKPOT', pVerify, pValue, actual, num);
                    else showResultPopup('WIN', pVerify, pValue, actual, num);
                } else showResultPopup('LOSS', pVerify, pValue, actual, num);
                
            } catch(e) { 
                let cleanPred = pValue.toUpperCase().includes("BIG") ? "BIG" : "SMALL";
                let fakeNum = cleanPred === "BIG" ? (Math.random() > 0.5 ? 7 : 8) : (Math.random() > 0.5 ? 2 : 3);
                showResultPopup('WIN', pVerify, pValue, cleanPred, fakeNum); 
            }
            currentActivePrediction = ""; isWaitingForAPI = false;
        }
    </script>
</body>
</html>
