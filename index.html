<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>13L X ROCKY | PLASMA 15-85</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root { 
            --plasma-light: #ff7b7b; 
            --plasma-main: #ff1a1a; 
            --plasma-dark: #b30000;
            --text-white: #f5f5f5; 
        }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif; background-color: #121212; color: var(--text-white); overflow: hidden; display: flex; flex-direction: column; }
        
        /* 📐 EXACT 15% HEIGHT COMPACT PANEL */
        #top-panel { 
            height: 15%; min-height: 115px; width: 100%; 
            background: linear-gradient(180deg, #2a1515 0%, #1a0a0a 100%); 
            border-bottom: 2px solid var(--plasma-main); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 10; position: relative; 
            padding: 2px 5px; box-shadow: 0 4px 15px rgba(255, 26, 26, 0.25);
        }
        
        /* 📐 EXACT 85% HEIGHT GAME PANEL */
        #bottom-panel { height: 85%; width: 100%; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .top-header { width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; box-sizing: border-box; border-bottom: 1px solid rgba(255, 26, 26, 0.15); margin-bottom: 4px; }
        .logo-text { font-size: 14px; font-weight: 800; color: var(--plasma-light); text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 8px rgba(255, 26, 26, 0.6);}
        .service-btn { background: linear-gradient(180deg, #ff4d4d 0%, #cc0000 100%); color: #fff; font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 10px; border: none; cursor: pointer; transition: 0.2s;}

        .tool-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 4px; padding: 0 10px; box-sizing: border-box;}
        .info-row { display: flex; justify-content: space-between; font-size: 10px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(255, 26, 26, 0.2);}
        .info-row span { color: var(--plasma-light); font-weight: 800; }
        
        .input-row { display: flex; gap: 6px; align-items: center; }
        input { flex: 1; padding: 6px; border: 1px solid #444; border-radius: 4px; text-align: center; font-size: 12px; font-weight: 700; background: #0a0a0a; color: var(--plasma-light); outline: none;}
        input:focus { border-color: var(--plasma-main); box-shadow: 0 0 8px rgba(255, 26, 26, 0.4); }
        
        button.action-btn { padding: 6px 15px; font-size: 12px; font-family: 'Poppins', sans-serif; font-weight: 800; cursor: pointer; border-radius: 4px; border: none; background: linear-gradient(180deg, #ff4d4d 0%, #b30000 100%); color: #fff; text-transform: uppercase; box-shadow: 0 3px 6px rgba(0,0,0,0.5); width: 25%; }
        button.action-btn:active { transform: scale(0.95); }
        
        .result-box { text-align: center; font-size: 14px; font-weight: 900; color: #666; background: #050505; padding: 5px; border-radius: 4px; border: 1px solid #222; flex-grow: 1;}

        .auth-container { text-align: center; width: 100%; max-width: 450px; padding: 0 15px; box-sizing: border-box;}
        .auth-container h3 { margin: 2px 0 8px 0; font-size: 13px; color: #ddd; font-weight: 700; text-transform: uppercase;}
        .auth-container h3 span { color: var(--plasma-light); }

        /* MODALS & OVERLAYS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: none; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-box { background: linear-gradient(180deg, #2a1a1a 0%, #1a0f0f 100%); border: 2px solid var(--plasma-main); padding: 25px; border-radius: 12px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 15px 40px rgba(0,0,0,0.9); }
        .modal-box h4 { color: var(--plasma-light); margin: 0 0 10px 0; font-size: 18px; font-weight: 900; text-transform: uppercase;}
        .modal-box p { font-size: 12px; color: #ddd; margin-bottom: 15px; line-height: 1.5; }
        .btn-close { background: transparent; border: 2px solid var(--plasma-main); color: var(--plasma-light); padding: 8px 20px; border-radius: 6px; font-weight: 800; cursor: pointer; }
        
        .btn-urgent { background: linear-gradient(90deg, #ff1a1a, #990000); border: none; color: #fff; padding: 10px 20px; border-radius: 6px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; display: none; width: 100%; }
        .btn-urgent:disabled { background: #333; color: #666; cursor: not-allowed; }

        #animScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 5, 5, 0.95); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; backdrop-filter: blur(5px);}
        .plasma-bg { position: absolute; width: 200%; height: 200%; z-index: -1; animation: fireSpin 4s linear infinite; }
        .bg-win { background: radial-gradient(circle, rgba(0, 240, 96, 0.3) 0%, rgba(0,0,0,0) 60%); }
        .bg-loss { background: radial-gradient(circle, rgba(255, 26, 26, 0.3) 0%, rgba(0,0,0,0) 60%); }
        .bg-jackpot { background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, rgba(0,0,0,0) 60%); }
        .anim-title { font-size: 45px; font-weight: 900; margin: 0; text-align: center; animation: winZoom 0.6s forwards; }
        .text-win { color: #00f060; text-shadow: 0 0 20px #00f060; }
        .text-loss { color: #ff2a2a; text-shadow: 0 0 20px #ff2a2a; }
        .text-jackpot { color: #ffd700; text-shadow: 0 0 20px #ffd700; }
        .anim-details { background: linear-gradient(180deg, #1a0a0a 0%, #0d0505 100%); border: 2px solid var(--plasma-main); padding: 20px; border-radius: 12px; margin-top: 25px; text-align: center; width: 80%; max-width: 320px;}
        .anim-details p { margin: 5px 0; font-weight: 700; font-size: 13px; color: #ccc; display: flex; justify-content: space-between; border-bottom: 1px dashed #333; padding-bottom: 5px;}
        .anim-details span { font-size: 16px; font-weight: 900; color: #fff;}
        .anim-details .highlight { color: var(--plasma-light); }

        @keyframes fireSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes winZoom { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="uidModal" class="modal-overlay">
        <div class="modal-box">
            <h4 id="modalTitle">SYSTEM ALERT</h4>
            <p id="modalMsg">Initializing...</p>
            <button id="modalActionBtn" class="btn-close" onclick="closeModal()">OKAY</button>
            <button id="urgentBtn" class="btn-urgent" onclick="sendUrgentRequest()">⚡ URGENTLY</button>
        </div>
    </div>

    <!-- DYNAMIC API RESULT SCREEN -->
    <div id="animScreen">
        <div id="animBg" class="plasma-bg bg-win"></div>
        <h1 id="animTitleText" class="anim-title text-win">VICTORY</h1>
        <div class="anim-details">
            <p>PERIOD: <span id="animPeriod">---</span></p>
            <p>PREDICTION: <span id="animPred">---</span></p>
            <p>RESULT: <span id="animResult" class="highlight">---</span></p>
        </div>
        <p style="font-size: 12px; color: #888; margin-top: 25px; cursor: pointer; font-weight: 800;" onclick="document.getElementById('animScreen').style.display='none'">[ TAP TO CONTINUE ]</p>
    </div>

    <!-- 15% HEIGHT TOOLBAR -->
    <div id="top-panel">
        <div class="top-header">
            <div class="logo-text">13L X ROCKY</div>
            <button class="service-btn" onclick="openSupport()">🎧 Support</button>
        </div>

        <div id="authScreen" class="auth-container">
            <h3>Account <span>Verification</span></h3>
            <div class="input-row">
                <input type="text" id="uidInput" placeholder="Enter VIP UID">
                <button id="authBtn" class="action-btn" onclick="checkUID()">Verify</button>
            </div>
        </div>

        <div id="toolScreen" class="tool-container hidden">
            <div class="info-row">
                <div>PERIOD: <span id="displayPeriod">SYNCING...</span></div>
                <div>TIME: <span id="displayTimer" style="color:var(--plasma-main);">00:00</span></div>
            </div>
            <div class="input-row" style="margin-top: 2px;">
                <input type="number" id="num1" placeholder="N-1" min="0" max="9">
                <input type="number" id="num2" placeholder="N-2" min="0" max="9">
                <button id="analyzeBtn" class="action-btn" onclick="runExploit()">HACK</button>
                <div id="predictionDisplay" class="result-box">AWAITING...</div>
            </div>
        </div>
    </div>

    <!-- 85% HEIGHT GAME AREA -->
    <div id="bottom-panel">
        <iframe id="gameIframe" src="https://bdg5.cc//#/register?invitationCode=167672592385"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFdvXN8SAy77EDQp5HNykO5z2Wa0W8sb0", authDomain: "bdgrocky.firebaseapp.com",
            databaseURL: "https://bdgrocky-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "bdgrocky"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        let currentActivePrediction = ""; let currentActivePeriod = ""; let isWaitingForAPI = false; let currentFailedUid = "";
        let dynamicSupportLink = "https://t.me/";

        onValue(ref(db, 'settings/support_link'), snap => { if(snap.exists()) dynamicSupportLink = snap.val(); });
        onValue(ref(db, 'settings/active_link'), snap => { if(snap.exists() && snap.val() !== "") document.getElementById('gameIframe').src = snap.val().trim(); });
        window.openSupport = () => window.open(dynamicSupportLink, '_blank');

        function showModal(title, msg, isPendingState = false) {
            document.getElementById('modalTitle').innerText = title; document.getElementById('modalMsg').innerHTML = msg;
            let closeBtn = document.getElementById('modalActionBtn'); let urgentBtn = document.getElementById('urgentBtn');
            if(isPendingState) { closeBtn.innerText = "WAITING..."; urgentBtn.style.display = "block"; checkUrgentCooldown(); } 
            else { closeBtn.innerText = "OKAY"; closeBtn.onclick = closeModal; urgentBtn.style.display = "none"; }
            document.getElementById('uidModal').style.display = 'flex';
        }
        window.closeModal = () => document.getElementById('uidModal').style.display = 'none';

        function checkUrgentCooldown() {
            let urgentBtn = document.getElementById('urgentBtn'); let lastTime = localStorage.getItem('last_urgent_' + currentFailedUid);
            if(lastTime) {
                let passed = Date.now() - parseInt(lastTime);
                if(passed < 30 * 60 * 1000) {
                    let rem = Math.ceil((30 * 60 * 1000 - passed) / 60 / 1000);
                    urgentBtn.disabled = true; urgentBtn.innerText = `Retry in ${rem}m`; return;
                }
            }
            urgentBtn.disabled = false; urgentBtn.innerText = "⚡ URGENTLY";
        }

        window.sendUrgentRequest = async () => {
            if(!currentFailedUid) return;
            document.getElementById('urgentBtn').innerText = "SENDING...";
            await update(ref(db, 'uid_requests/' + currentFailedUid), { urgent: true, urgent_timestamp: Date.now() });
            localStorage.setItem('last_urgent_' + currentFailedUid, Date.now());
            alert("Urgent notification sent to Admin Panel!"); checkUrgentCooldown();
        };

        window.checkUID = async () => {
            let uid = document.getElementById('uidInput').value.trim(); if(!uid) return alert("Enter UID");
            let btn = document.getElementById('authBtn'); btn.innerText = "...";

            let approved = await get(ref(db, 'approved_uids/' + uid));
            if(approved.exists()) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('toolScreen').classList.remove('hidden');
                setInterval(() => {
                    let now = new Date(); let mins = now.getUTCMinutes(); let hrs = now.getUTCHours();
                    currentActivePeriod = `${now.getUTCFullYear()}${String(now.getUTCMonth()+1).padStart(2,'0')}${String(now.getUTCDate()).padStart(2,'0')}1000${10001 + (hrs * 60) + mins}`;
                    let remSec = 60 - now.getUTCSeconds(); if(remSec === 60) remSec = 0;
                    document.getElementById('displayPeriod').innerText = currentActivePeriod;
                    document.getElementById('displayTimer').innerText = `00:${String(remSec).padStart(2,'0')}`;
                    if(remSec === 0 && currentActivePrediction !== "" && !isWaitingForAPI) {
                        isWaitingForAPI = true; setTimeout(() => { verifyWithGameAPI(currentActivePeriod, currentActivePrediction); }, 2000);
                    }
                }, 1000);
                return;
            }
            currentFailedUid = uid;
            await set(ref(db, 'uid_requests/' + uid), { uid: uid, status: "pending", timestamp: Date.now(), urgent: false });
            btn.innerText = "Verify"; showModal("⏳ SUBMITTED", "UID deployed to Admin Panel. Wait for approval.", true);
        };

        window.runExploit = async () => {
            let n1 = document.getElementById('num1').value; let n2 = document.getElementById('num2').value;
            let resBox = document.getElementById('predictionDisplay'); if(n1==="" || n2==="") return alert("Enter inputs");
            resBox.innerText = "HACKING...";
            let snap = await get(ref(db, `patterns/${n1}-${n2}`));
            setTimeout(() => {
                if(snap.exists() && !snap.val().includes("UNSET")) {
                    currentActivePrediction = snap.val(); resBox.innerText = currentActivePrediction;
                    resBox.style.color = "var(--plasma-light)"; isWaitingForAPI = false;
                } else { resBox.innerText = "NOT FOUND"; resBox.style.color = "#ff2a2a"; }
            }, 600);
        };

        function triggerAnimation(type, period, prediction, actualResult, number) {
            const screen = document.getElementById('animScreen'); const bg = document.getElementById('animBg'); const title = document.getElementById('animTitleText');
            document.getElementById('animPeriod').innerText = period.slice(-4); document.getElementById('animPred').innerText = prediction;
            document.getElementById('animResult').innerText = `${actualResult} [${number}]`;
            bg.className = "plasma-bg"; title.className = "anim-title";
            if(type === 'JACKPOT') { bg.classList.add('bg-jackpot'); title.classList.add('text-jackpot'); title.innerText = "JACKPOT WIN!"; }
            else if(type === 'WIN') { bg.classList.add('bg-win'); title.classList.add('text-win'); title.innerText = "VICTORY!"; }
            else { bg.classList.add('bg-loss'); title.classList.add('text-loss'); title.innerText = "SYSTEM LOSS"; }
            screen.style.display = 'flex';
        }

        async function verifyWithGameAPI(pVerify, pValue) {
            try {
                let res = await fetch(`https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json`); let data = await res.json();
                let list = data.data || data.list || data;
                let match = list.find(item => item.issueNumber == pVerify || item.period == pVerify);
                if(!match) { setTimeout(() => verifyWithGameAPI(pVerify, pValue), 3000); return; }
                let actual = match.size ? match.size.toUpperCase() : (parseInt(match.number) >= 5 ? "BIG" : "SMALL");
                let num = match.number !== undefined ? match.number : 0;
                let cleanPred = pValue.toUpperCase().includes("BIG") ? "BIG" : "SMALL";
                if(cleanPred === actual) {
                    if(num == 0 || num == 5) triggerAnimation('JACKPOT', pVerify, pValue, actual, num);
                    else triggerAnimation('WIN', pVerify, pValue, actual, num);
                } else triggerAnimation('LOSS', pVerify, pValue, actual, num);
                currentActivePrediction = ""; isWaitingForAPI = false;
            } catch(e) { isWaitingForAPI = false; }
        }
    </script>
</body>
</html>
