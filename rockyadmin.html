<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIKKIM X ROCKY | ENTERPRISE ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Rajdhani:wght@600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* 🎨 ENTERPRISE SAAS THEME */
        :root { 
            --bg-body: #020617; --bg-card: #0f172a; --bg-nav: #050b14;
            --primary: #3b82f6; --primary-hover: #2563eb; --primary-light: rgba(59, 130, 246, 0.15);
            --gold: #f59e0b; --green: #10b981; --red: #ef4444; --violet: #8b5cf6;
            --text-main: #f8fafc; --text-muted: #94a3b8; --border: #1e293b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-body); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        
        /* 🔒 LOGIN SCREEN */
        .login-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-body); display: flex; justify-content: center; align-items: center; z-index: 9999;}
        .login-card { background: var(--bg-card); border: 1px solid var(--border); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(59, 130, 246, 0.05);}
        .login-card h2 { color: var(--primary); font-family: 'Rajdhani', sans-serif; font-size: 32px; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase;}
        
        /* 📱 DASHBOARD LAYOUT */
        .dashboard-container { display: flex; flex-direction: column; height: 100vh; }
        
        /* 🔝 TOP NAVBAR */
        .top-navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: var(--bg-nav); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;}
        .brand { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 900; color: var(--text-main); letter-spacing: 2px;}
        .brand span { color: var(--primary); }
        .admin-profile { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: var(--text-muted);}
        .admin-profile span { background: var(--primary-light); color: var(--primary); padding: 5px 12px; border-radius: 20px; font-family: 'Share Tech Mono';}

        /* 📡 LIVE NOTIFICATION BANNER (DEV BROADCAST) */
        .notification-banner { width: 100%; padding: 12px 20px; text-align: center; font-size: 13px; font-weight: 600; letter-spacing: 1px; display: none; align-items: center; justify-content: center; gap: 10px; animation: slideDown 0.4s ease forwards;}
        .banner-info { background: rgba(59, 130, 246, 0.1); border-bottom: 1px solid var(--primary); color: var(--primary); }
        .banner-warning { background: rgba(245, 158, 11, 0.1); border-bottom: 1px solid var(--gold); color: var(--gold); }
        .banner-critical { background: rgba(239, 68, 68, 0.1); border-bottom: 1px solid var(--red); color: #fff; text-shadow: 0 0 10px var(--red); }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        /* 📊 MAIN CONTENT GRID */
        .main-content { padding: 30px; flex-grow: 1; overflow-y: auto; }
        
        /* WIDGETS */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px;}
        .widget-card { background: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s;}
        .widget-card:hover { transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 8px 25px rgba(59,130,246,0.15);}
        .w-title { font-size: 12px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}
        .w-value { font-size: 36px; font-family: 'Share Tech Mono', monospace; font-weight: bold; margin-top: 5px; color: var(--text-main);}

        /* PANELS / SECTIONS */
        .bento-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 25px; }
        .bento-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .card-header { padding: 15px 20px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center;}
        .card-header h3 { font-size: 15px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 8px; text-transform: uppercase;}
        .card-body { padding: 15px; flex-grow: 1; overflow-y: auto; height: 380px;}

        /* UI ELEMENTS */
        input[type="text"], input[type="password"], input[type="number"], select { width: 100%; padding: 12px 15px; background: var(--bg-body); border: 1px solid var(--border); color: var(--text-main); font-family: 'Share Tech Mono'; font-size: 14px; border-radius: 8px; outline: none; margin-bottom: 15px; transition: 0.3s;}
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        button { padding: 12px 20px; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; letter-spacing: 0.5px;}
        button:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 4px 15px var(--primary-light);}
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { border-color: var(--text-main); }
        .btn-action-green { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--green); color: var(--green); padding: 8px 12px; font-size: 11px;}
        .btn-action-red { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--red); color: var(--red); padding: 8px 12px; font-size: 11px;}

        /* TABLES */
        table { width: 100%; min-width: 400px; border-collapse: collapse; font-size: 13px; text-align: left;}
        th { background: rgba(255,255,255,0.02); padding: 12px 15px; position: sticky; top: 0; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
        td { border-bottom: 1px solid var(--border); padding: 12px 15px; vertical-align: middle; color: var(--text-main);}
        tr:hover td { background: rgba(255,255,255,0.01); }

        /* LIST CARDS (Logins, Deposits) */
        .list-item { background: var(--bg-body); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; transition: 0.2s;}
        .list-item:hover { border-color: rgba(255,255,255,0.1); }
        .list-header { display: flex; justify-content: space-between; align-items: center;}
        .uid-tag { font-family: 'Share Tech Mono'; font-size: 15px; font-weight: bold; color: var(--text-main);}
        .device-info { font-size: 11px; color: var(--text-muted); background: var(--bg-card); padding: 4px 8px; border-radius: 4px; display: inline-block;}
        .action-group { display: flex; gap: 8px; align-items: center; margin-top: 5px;}

        /* MINI BALLS */
        .preview-box { display: flex; align-items: center; gap: 8px;}
        .mini-ball { width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; color: #fff; font-size: 11px; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.5);}
        .bg-g { background: var(--green); } .bg-r { background: var(--red); } .bg-rv { background: linear-gradient(135deg, var(--red) 50%, var(--violet) 50%); } .bg-gv { background: linear-gradient(135deg, var(--green) 50%, var(--violet) 50%); }
        .mini-badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 800;}
        .b-big { background: rgba(245, 158, 11, 0.15); color: var(--gold); border: 1px solid rgba(245, 158, 11, 0.3); }
        .b-small { background: rgba(59, 130, 246, 0.15); color: var(--primary); border: 1px solid rgba(59, 130, 246, 0.3); }

        .deposit-img { width: 100%; max-height: 140px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s;}
        .deposit-img:hover { opacity: 0.8; }

        @media screen and (max-width: 1024px) { .bento-grid { grid-template-columns: 1fr; } }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: var(--bg-body); } ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- FULL SCREEN IMAGE VIEWER -->
    <div id="imgModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:99999; display:none; justify-content:center; align-items:center; flex-direction:column; backdrop-filter: blur(5px);">
        <img id="fullImg" src="" style="max-width:90%; max-height:80vh; border-radius:8px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);">
        <button class="btn-outline" style="width:200px; margin-top:20px;" onclick="document.getElementById('imgModal').style.display='none'">CLOSE PREVIEW</button>
    </div>

    <!-- LOGIN SCREEN -->
    <div class="login-wrapper" id="loginBox">
        <div class="login-card">
            <h2>SYSTEM LOGIN</h2>
            <input type="password" id="pass" placeholder="Enter Administrator PIN">
            <button class="btn-primary" style="width: 100%;" onclick="login()">AUTHORIZE ACCESS</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="dashboard-container hidden" id="dashBox">
        
        <!-- DEV BROADCAST BANNER -->
        <div id="devAlertBanner" class="notification-banner">
            <span style="font-size: 16px;">📡</span>
            <span id="devAlertText">Incoming Dev Broadcast...</span>
        </div>

        <!-- TOP NAVBAR -->
        <header class="top-navbar">
            <div class="brand">ROCKY <span>CORE</span></div>
            <div class="admin-profile">
                STATUS <span>SECURE</span>
            </div>
        </header>

        <!-- CONTENT -->
        <main class="main-content">
            
            <!-- STATS ROW -->
            <div class="stats-row">
                <div class="widget-card">
                    <span class="w-title">Active Database</span>
                    <span class="w-value" id="statTotalUsers">0</span>
                </div>
                <div class="widget-card">
                    <span class="w-title" style="color: var(--primary);">Pending Logins</span>
                    <span class="w-value" style="color: var(--primary);" id="statPendingReq">0</span>
                </div>
                <div class="widget-card">
                    <span class="w-title" style="color: var(--green);">Pending Deposits</span>
                    <span class="w-value" style="color: var(--green);" id="statDepositReq">0</span>
                </div>
                <div class="widget-card">
                    <span class="w-title" style="color: var(--violet);">Live Matrices</span>
                    <span class="w-value" style="color: var(--text-main); font-size: 28px; margin-top: 10px;" id="statPatterns">0 / 100</span>
                </div>
            </div>

            <!-- BENTO GRID LAYOUT -->
            <div class="bento-grid">
                
                <!-- PREDICTION MATRIX ENGINE -->
                <div class="bento-card" style="grid-row: span 2;">
                    <div class="card-header">
                        <h3 style="color: var(--primary);">⚙️ PREDICTION MATRIX ENGINE</h3>
                        <button class="btn-outline" style="padding: 6px 12px; font-size: 11px;" onclick="autoShuffle()">Auto Gen</button>
                    </div>
                    <div class="card-body" style="padding: 0; height: 800px;">
                        <table>
                            <thead><tr><th style="width: 20%;">COMB</th><th style="width: 25%;">INPUT</th><th style="width: 35%;">PREVIEW</th><th style="width: 20%;">ACTION</th></tr></thead>
                            <tbody id="patternTbody"></tbody>
                        </table>
                    </div>
                </div>

                <!-- DEPOSIT VERIFICATIONS -->
                <div class="bento-card">
                    <div class="card-header">
                        <h3 style="color: var(--green);">💰 FINANCIAL & DEPOSITS</h3>
                    </div>
                    <div class="card-body" id="depositContainer">
                        <!-- Deposit Items Load Here -->
                    </div>
                </div>

                <!-- NEW LOGINS & VERIFICATIONS -->
                <div class="bento-card">
                    <div class="card-header">
                        <h3 style="color: var(--gold);">⚡ ACCESS REQUESTS</h3>
                    </div>
                    <div class="card-body" id="requestsContainer">
                        <!-- Login Items Load Here -->
                    </div>
                </div>

                <!-- ACTIVE USERS (FULL WIDTH SPAN) -->
                <div class="bento-card" style="grid-column: 1 / -1;">
                    <div class="card-header">
                        <h3 style="color: var(--text-main);">🛡️ USER DATABASE MANAGEMENT</h3>
                        <div style="display: flex; gap: 8px; width: 400px;">
                            <input type="text" id="manualUidInput" placeholder="UID" style="margin: 0; padding: 8px 12px;">
                            <select id="manualDays" style="margin: 0; width: 100px; padding: 8px 12px;"><option value="1">1D</option><option value="30">30D</option></select>
                            <button class="btn-primary" style="padding: 8px 15px;" onclick="addManualUID()">ADD</button>
                        </div>
                    </div>
                    <div class="card-body" id="activeUsersContainer" style="height: 300px;">
                        <!-- Active Users Load Here -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- ⚡ SYSTEM LOGIC ⚡ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({
            apiKey: "AIzaSyBFdvXN8SAy77EDQp5HNykO5z2Wa0W8sb0", authDomain: "bdgrocky.firebaseapp.com",
            databaseURL: "https://bdgrocky-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "bdgrocky"
        });
        const db = getDatabase(app);

        window.login = () => {
            if(document.getElementById('pass').value === "13LADMIN") { 
                document.getElementById('loginBox').style.display = 'none'; 
                document.getElementById('dashBox').classList.remove('hidden');
                buildTable(); syncData(); listenRequests(); listenDeposits(); listenActiveUsers(); listenDevNotifications();
            } else alert("INVALID CREDENTIALS!");
        };

        // 🔥 LISTEN FOR DEV BROADCASTS 🔥
        function listenDevNotifications() {
            onValue(ref(db, 'settings/admin_notification'), snap => {
                if(snap.exists()) {
                    let data = snap.val();
                    let banner = document.getElementById('devAlertBanner');
                    let text = document.getElementById('devAlertText');
                    
                    text.innerText = `DEV MESSAGE: ${data.message}`;
                    banner.className = "notification-banner"; // reset
                    
                    if(data.type === "critical") banner.classList.add("banner-critical");
                    else if(data.type === "warning") banner.classList.add("banner-warning");
                    else banner.classList.add("banner-info");
                    
                    banner.style.display = "flex";
                }
            });
        }

        window.getPreviewHtml = (numStr) => {
            let n = parseInt(numStr); let size = n >= 5 ? "BIG" : "SMALL";
            let ballHtml = "";
            if(n === 0) ballHtml = `<div class="mini-ball bg-rv">0</div>`;
            else if(n === 5) ballHtml = `<div class="mini-ball bg-gv">5</div>`;
            else if(n % 2 === 0) ballHtml = `<div class="mini-ball bg-r">${n}</div>`;
            else ballHtml = `<div class="mini-ball bg-g">${n}</div>`;
            let badgeHtml = size === "BIG" ? `<span class="mini-badge b-big">BIG</span>` : `<span class="mini-badge b-small">SMALL</span>`;
            return `<div class="preview-box">${ballHtml} ${badgeHtml}</div>`;
        };

        function buildTable() {
            let body = document.getElementById('patternTbody'); body.innerHTML = "";
            for(let i=0; i<=9; i++) {
                for(let j=0; j<=9; j++) {
                    let k = `${i}-${j}`;
                    body.innerHTML += `<tr>
                        <td style="font-family:'Share Tech Mono'; font-weight:bold; color:var(--text-muted);">${k}</td>
                        <td><input type="number" id="nm-${k}" min="0" max="9" placeholder="#" style="margin:0; padding:8px; text-align:center;"></td>
                        <td id="live-${k}">-</td>
                        <td><button class="btn-outline" style="padding:6px 12px; font-size:11px;" onclick="saveSingle('${k}')">SAVE</button></td>
                    </tr>`;
                }
            }
        }

        window.saveSingle = async (k) => {
            let nm = document.getElementById(`nm-${k}`).value.trim();
            if(nm === "" || nm < 0 || nm > 9) return alert("Enter Number (0-9)!");
            let autoSz = parseInt(nm) >= 5 ? "BIG" : "SMALL";
            await set(ref(db, `patterns/${k}`), `${autoSz} [${nm}]`); document.getElementById(`nm-${k}`).value = ""; 
        };

        window.autoShuffle = async () => {
            if(!confirm("Overwrite ALL 100 Matrices?")) return;
            let b = {}; 
            for(let i=0; i<=9; i++) { for(let j=0; j<=9; j++) { let rNum = Math.floor(Math.random()*10); let rSz = rNum >= 5 ? "BIG" : "SMALL"; b[`${i}-${j}`] = `${rSz} [${rNum}]`; } }
            await update(ref(db, 'patterns'), b); alert("AUTO-GENERATED!");
        };

        function syncData() {
            onValue(ref(db, 'patterns'), snap => {
                let count = 0;
                if(snap.exists()) { 
                    snap.forEach(c => { 
                        count++;
                        let el = document.getElementById(`live-${c.key}`); 
                        if(el) { let match = c.val().match(/\[(\d+)\]/); if(match) el.innerHTML = window.getPreviewHtml(match[1]); } 
                    }); 
                }
                document.getElementById('statPatterns').innerText = `${count} / 100`;
            });
        }

        function listenRequests() {
            onValue(ref(db, 'uid_requests'), snap => {
                let container = document.getElementById('requestsContainer'); let reqCountObj = document.getElementById('statPendingReq'); container.innerHTML = "";
                if(!snap.exists()) { reqCountObj.innerText = "0"; return; }
                let count = 0; let html = "";
                snap.forEach(child => {
                    count++; let data = child.val();
                    let info = data.deviceInfo ? `${data.deviceInfo.os} | ${data.deviceInfo.browser}` : "Device Info N/A";
                    html += `<div class="list-item">
                        <div class="list-header">
                            <span class="uid-tag">UID: ${data.uid}</span>
                            <span class="device-info">📱 ${info}</span>
                        </div>
                        <div class="action-group">
                            <button class="btn-action-green" style="flex:1;" onclick="approveUid('${data.uid}')">GRANT FREE TRIAL (5 PLAYS)</button>
                            <button class="btn-action-red" onclick="rejectUid('${data.uid}')">REJECT</button>
                        </div></div>`; 
                });
                reqCountObj.innerText = count; container.innerHTML = html;
            });
        }

        function listenDeposits() {
            onValue(ref(db, 'deposit_requests'), snap => {
                let container = document.getElementById('depositContainer'); let countObj = document.getElementById('statDepositReq'); container.innerHTML = "";
                if(!snap.exists()) { countObj.innerText = "0"; return; }
                let count = 0; let html = "";
                snap.forEach(child => {
                    count++; let data = child.val();
                    html += `<div class="list-item">
                        <span class="uid-tag" style="color: var(--green);">UID: ${data.uid}</span>
                        <img src="${data.screenshot}" class="deposit-img" onclick="showFullImg('${data.screenshot}')">
                        <div class="action-group">
                            <select id="depDays-${data.uid}" style="width: 80px; margin:0; padding:6px; font-size:11px;"><option value="30">30 DAYS</option><option value="999">LIFETIME</option></select>
                            <button class="btn-action-green" style="flex:1;" onclick="approveDeposit('${data.uid}')">UPGRADE TO VIP</button>
                            <button class="btn-action-red" onclick="rejectDeposit('${data.uid}')">DECLINE</button>
                        </div></div>`; 
                });
                countObj.innerText = count; container.innerHTML = html;
            });
        }

        window.showFullImg = (src) => { document.getElementById('fullImg').src = src; document.getElementById('imgModal').style.display = 'flex'; }

        window.approveUid = async (uid) => { 
            let expireAt = Date.now() + (30 * 24 * 60 * 60 * 1000); 
            await set(ref(db, 'approved_uids/' + uid), { active: true, expireAt: expireAt, predictions_used: 0, is_premium: false }); 
            await remove(ref(db, 'uid_requests/' + uid)); 
        };
        window.rejectUid = async (uid) => { await remove(ref(db, 'uid_requests/' + uid)); };

        window.approveDeposit = async (uid) => {
            let days = parseInt(document.getElementById(`depDays-${uid}`).value);
            let expireAt = Date.now() + (days * 24 * 60 * 60 * 1000);
            await update(ref(db, 'approved_uids/' + uid), { is_premium: true, expireAt: expireAt });
            await remove(ref(db, 'deposit_requests/' + uid));
        };
        window.rejectDeposit = async (uid) => { await remove(ref(db, 'deposit_requests/' + uid)); };
        
        window.addManualUID = async () => {
            let uid = document.getElementById('manualUidInput').value.trim(); if(!uid) return;
            let days = parseInt(document.getElementById('manualDays').value);
            let expireAt = Date.now() + (days * 24 * 60 * 60 * 1000);
            await set(ref(db, 'approved_uids/' + uid), { active: true, expireAt: expireAt, predictions_used: 0, is_premium: true }); 
            document.getElementById('manualUidInput').value = "";
        };

        function listenActiveUsers() {
            onValue(ref(db, 'approved_uids'), snap => {
                let container = document.getElementById('activeUsersContainer'); let countObj = document.getElementById('statTotalUsers'); container.innerHTML = "";
                if(!snap.exists()) { countObj.innerText = "0"; return; }
                let count = 0; let userHtml = "";
                
                // Flex Wrap Container for Active Users
                userHtml += `<div style="display:flex; flex-wrap:wrap; gap:15px;">`;
                
                snap.forEach(child => {
                    count++; let uid = child.key; let data = child.val();
                    let daysLeft = "L/T";
                    if(data.expireAt) {
                        let msLeft = data.expireAt - Date.now();
                        daysLeft = msLeft > 0 ? Math.ceil(msLeft / (1000 * 60 * 60 * 24)) + "D" : "EXP";
                    }
                    let statusColor = data.is_banned ? "var(--red)" : (data.is_premium ? "var(--gold)" : "var(--primary)");
                    let statusText = data.is_banned ? "🚫 BANNED" : (data.is_premium ? "👑 VIP" : `FREE (${data.predictions_used || 0}/5)`);
                    
                    userHtml += `<div style="background:var(--bg-body); border:1px solid var(--border); border-left: 3px solid ${statusColor}; padding:12px; border-radius:8px; width: calc(33.33% - 10px); min-width: 250px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-family:'Share Tech Mono'; font-weight:bold; font-size:15px; color:var(--text-main);"># ${uid}</div>
                            <div style="font-size:11px; color:${statusColor}; font-weight:bold; margin-top:4px;">${statusText} <span style="color:var(--text-muted); font-weight:normal; margin-left:5px;">| ${daysLeft}</span></div>
                        </div>
                        <button class="btn-action-red" onclick="banUser('${uid}')">REVOKE</button>
                    </div>`;
                });
                userHtml += `</div>`;
                
                countObj.innerText = count; container.innerHTML = userHtml;
            });
        }
        window.banUser = async (uid) => { await remove(ref(db, 'approved_uids/' + uid)); await remove(ref(db, 'device_bindings/' + uid)); };
    </script>
</body>
</html>
