<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13L X ROCKY | ADMIN CORE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;900&family=Share+Tech+Mono&display=swap');
        :root { --bg: #060806; --green: #00f060; --red: #ff1a1a; --text: #e8f5ec; }
        body { margin: 0; padding: 15px; font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; }
        * { box-sizing: border-box; }
        .glass-panel { background: rgba(10, 15, 12, 0.95); border: 1px solid rgba(0, 240, 96, 0.3); border-radius: 10px; width: 100%; max-width: 900px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 20px;}
        h2 { text-align: center; color: var(--green); margin: 0 0 15px 0; letter-spacing: 2px; border-bottom: 1px dashed #333; padding-bottom: 10px;}
        .grid-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; width: 100%; max-width: 900px; }
        .sub-panel { background: rgba(0,0,0,0.4); border: 1px solid #222; padding: 15px; border-radius: 8px; }
        h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 5px; font-size: 18px;}
        
        input[type="password"], input[type="number"], select { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: var(--green); font-family: 'Share Tech Mono'; text-align: center; margin-bottom: 10px; border-radius: 4px;}
        button { width: 100%; padding: 12px; font-family: 'Rajdhani'; font-size: 16px; font-weight: 900; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase;}
        .btn-green { background: var(--green); color: #000; }
        .btn-red { background: linear-gradient(90deg, #ff5500, #ff1a1a); color: #fff; margin-bottom: 15px;}
        .hidden { display: none !important; }

        .table-wrap { max-height: 400px; overflow-y: auto; background: #000; border: 1px solid #222; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono'; font-size: 12px; text-align: center;}
        th { background: #0a140d; padding: 10px 5px; position: sticky; top: 0; color: #888;}
        td { border-bottom: 1px solid #222; padding: 8px 4px; }

        /* REQ CARDS */
        .req-card { background: #111; border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 4px; display: flex; flex-direction: column; gap: 5px;}
        .urgent-tag { background: var(--red); color: #fff; font-size: 11px; font-weight: 900; padding: 2px 6px; border-radius: 3px; align-self: flex-start; animation: blink 1s infinite alternate; }
        
        @keyframes blink { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- 🔐 LOGIN -->
    <div class="glass-panel" id="loginBox" style="max-width: 400px; margin-top: 100px;">
        <h2>13L X ROCKY ADMIN</h2>
        <input type="password" id="pass" placeholder="ENTER ACCESS PIN">
        <button class="btn-green" onclick="login()">LOGIN</button>
    </div>

    <!-- 🎛️ MAIN PANEL -->
    <div class="glass-panel hidden" id="dashBox">
        <h2>MASTER MANAGEMENT HUB</h2>
        <button class="btn-red" onclick="autoShuffle()">⚡ 1-CLICK SHUFFLE ALL 100 PATTERNS</button>
        
        <div class="grid-layout">
            <!-- LEFT: 100 COMBINATIONS TERMINAL -->
            <div class="sub-panel">
                <h3 style="color: var(--green);">📊 PATTERN DATA MATRIX</h3>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>COMB</th><th>SIZE</th><th>NUM</th><th>LIVE</th><th>SAVE</th></tr></thead>
                        <tbody id="patternTbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- RIGHT: LIVE UID APPROVAL DESK -->
            <div class="sub-panel" style="border-color: var(--red);">
                <h3 style="color: var(--red);">⚡ LIVE UID REQUESTS</h3>
                <div id="requestsContainer" style="max-height: 400px; overflow-y: auto; padding-right: 5px;">
                    <p style="color:#666; text-align:center;">No pending requests found...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFdvXN8SAy77EDQp5HNykO5z2Wa0W8sb0", authDomain: "bdgrocky.firebaseapp.com",
            databaseURL: "https://bdgrocky-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "bdgrocky"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        window.login = () => {
            if(document.getElementById('pass').value === "13LADMIN") {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('dashBox').classList.remove('hidden');
                buildTable(); syncData(); listenRequests();
            } else alert("WRONG PIN");
        };

        function buildTable() {
            let body = document.getElementById('patternTbody'); body.innerHTML = "";
            for(let i=0; i<=9; i++) {
                for(let j=0; j<=9; j++) {
                    let k = `${i}-${j}`;
                    body.innerHTML += `<tr><td><b>${k}</b></td><td><select id="sz-${k}"><option value="BIG">B</option><option value="SMALL">S</option></select></td><td><input type="number" id="nm-${k}" min="0" max="9" placeholder="#"></td><td id="live-${k}" style="color:#555;">-</td><td><button class="btn-green" style="padding:4px; font-size:11px;" onclick="saveSingle('${k}')">SET</button></td></tr>`;
                }
            }
        }

        window.saveSingle = async (k) => {
            let sz = document.getElementById(`sz-${k}`).value; let nm = document.getElementById(`nm-${k}`).value.trim();
            if(nm==="" || nm<0 || nm>9) return alert("Enter 0-9");
            await set(ref(db, `patterns/${k}`), `${sz} [${nm}]`);
            document.getElementById(`nm-${k}`).value = "";
        };

        window.autoShuffle = async () => {
            if(!confirm("Shuffle 100 patterns?")) return;
            let b = {}; const s = ["BIG", "SMALL"];
            for(let i=0; i<=9; i++) {
                for(let j=0; j<=9; j++) b[`${i}-${j}`] = `${s[Math.floor(Math.random()*2)]} [${Math.floor(Math.random()*10)}]`;
            }
            await update(ref(db, 'patterns'), b); alert("Shuffled!");
        };

        function syncData() {
            onValue(ref(db, 'patterns'), snap => {
                if(snap.exists()) { snap.forEach(c => { let el = document.getElementById(`live-${c.key}`); if(el) { el.innerText = c.val().split(' ')[0]; el.style.color = c.val().includes("BIG") ? var(--green) : var(--red); } }); }
            });
        }

        // ⚡ LIVE REQUESTS MONITORING & APPROVAL ENGINE
        function listenRequests() {
            onValue(ref(db, 'uid_requests'), snap => {
                let container = document.getElementById('requestsContainer'); container.innerHTML = "";
                if(!snap.exists()) { container.innerHTML = `<p style="color:#666; text-align:center;">No pending requests found...</p>`; return; }
                
                snap.forEach(child => {
                    let data = child.val();
                    let urgentTag = data.urgent ? `<div class="urgent-tag">🔴 CRITICAL URGENT</div>` : '';
                    let time = new Date(data.timestamp).toLocaleTimeString();
                    
                    container.innerHTML += `
                        <div class="req-card" style="border-color: ${data.urgent ? 'var(--red)' : '#333'}">
                            ${urgentTag}
                            <div style="font-family:'Share Tech Mono'; font-size:14px;"><b>UID:</b> <span style="color:var(--green);">${data.uid}</span></div>
                            <div style="font-size:11px; color:#aaa;">Time: ${time}</div>
                            <button class="btn-green" style="padding:6px; font-size:12px; margin-top:5px;" onclick="approveUid('${data.uid}')">✅ APPROVE USER</button>
                        </div>
                    `;
                });
            });
        }

        window.approveUid = async (uid) => {
            await set(ref(db, 'approved_uids/' + uid), true);
            await remove(ref(db, 'uid_requests/' + uid));
            alert(`UID [ ${uid} ] successfully approved!`);
        };
    </script>
</body>
</html>
