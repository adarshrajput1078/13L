<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>13L X ROCKY | DEV CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Rajdhani:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --plasma: #ff1a1a; --gold: #d9a036; --bg: #050505; --panel-bg: rgba(15, 5, 5, 0.95); --green: #00f060;}
        body { margin: 0; padding: 15px; font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh;}
        * { box-sizing: border-box; }

        .glass-panel { background: var(--panel-bg); border: 2px solid var(--plasma); border-radius: 12px; width: 100%; max-width: 600px; padding: 25px; margin-bottom: 20px;}
        h1 { text-align: center; font-family: 'Rajdhani', sans-serif; color: var(--plasma); font-size: 26px; letter-spacing: 2px; margin: 0 0 20px 0; border-bottom: 1px dashed #333; padding-bottom: 10px;}
        
        .dev-section { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .dev-section h3 { font-family: 'Rajdhani', sans-serif; color: var(--gold); margin: 0 0 10px 0; font-size: 18px; display: flex; justify-content: space-between; align-items: center;}
        
        label { font-size: 11px; color: #888; font-weight: 700; display: block; margin-bottom: 5px;}
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; font-family: 'Share Tech Mono'; font-size: 14px; border-radius: 6px; outline: none; margin-bottom: 10px;}
        button { width: 100%; padding: 12px; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 900; background: linear-gradient(90deg, #b30000, #ff1a1a); color: #fff; border: none; border-radius: 6px; cursor: pointer; letter-spacing: 1px;}
        
        .switch-container { display: flex; align-items: center; justify-content: space-between; background: #000; padding: 12px; border-radius: 6px; border: 1px dashed #333;}
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; border-radius: 34px; transition: .4s;}
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; border-radius: 50%; transition: .4s;}
        input:checked + .slider { background-color: var(--plasma); }
        input:checked + .slider:before { transform: translateX(22px); }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-family: 'Share Tech Mono'; font-size: 11px; font-weight: bold;}
        .status-online { background: rgba(0, 240, 96, 0.2); color: #00f060; border: 1px solid #00f060;}
        .status-offline { background: rgba(255, 26, 26, 0.2); color: #ff1a1a; border: 1px solid #ff1a1a;}

        .req-card { background: #111; border: 1px solid #333; padding: 10px; margin-bottom: 8px; border-radius: 6px; display: flex; flex-direction: column; gap: 6px;}
        .urgent-tag { background: var(--plasma); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; align-self: flex-start; }
        .req-actions { display: flex; gap: 8px; margin-top: 5px; }
        .req-actions button { padding: 8px; font-size: 12px; border-radius: 4px; flex: 1; border: 1px solid;}
        
        @media screen and (max-width: 768px) {
            .glass-panel { padding: 15px; }
            h1 { font-size: 22px; }
            .dev-section h3 { font-size: 16px; flex-direction: column; align-items: flex-start; gap: 5px; }
            .switch-container { flex-direction: column; gap: 10px; align-items: flex-start;}
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="glass-panel" id="loginBox" style="margin-top: 10vh;">
        <h1>DEVELOPER CORE</h1>
        <input type="password" id="devPass" placeholder="ENTER MASTER KEY">
        <button onclick="devLogin()">AUTHENTICATE</button>
    </div>

    <div class="glass-panel hidden" id="devDash">
        <h1>SYSTEM ARCHITECTURE</h1>

        <div class="dev-section" style="border-color: var(--plasma);">
            <h3><span>⚡ LIVE UID REQUESTS</span> <span id="devReqCount" class="status-badge status-offline" style="background:var(--plasma); color:#fff;">0</span></h3>
            <div id="devRequestsContainer" style="max-height: 250px; overflow-y: auto;"></div>
        </div>

        <div class="dev-section">
            <h3><span>⚙️ PLATFORM STATUS</span> <span id="statusBadge" class="status-badge status-online">ONLINE</span></h3>
            <div class="switch-container">
                <span style="font-weight: 700; color: #fff; font-size: 13px;">MAINTENANCE MODE</span>
                <label class="switch"><input type="checkbox" id="maintToggle" onchange="updateMaintenance()"><span class="slider"></span></label>
            </div>
        </div>

        <div class="dev-section">
            <h3>🎮 GAME LINK CONFIG</h3>
            <input type="text" id="gameLinkInput" placeholder="https://...">
            <button onclick="saveGameLink()" style="background: var(--gold); color: #000;">UPDATE LINK</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({
            apiKey: "AIzaSyBFdvXN8SAy77EDQp5HNykO5z2Wa0W8sb0", authDomain: "bdgrocky.firebaseapp.com",
            databaseURL: "https://bdgrocky-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "bdgrocky"
        });
        const db = getDatabase(app);

        window.devLogin = () => {
            if(document.getElementById('devPass').value === "ROCKYDEV") { 
                document.getElementById('loginBox').classList.add('hidden'); document.getElementById('devDash').classList.remove('hidden');
                loadCurrentSettings(); listenDevRequests();
            } else alert("ACCESS DENIED");
        };

        function listenDevRequests() {
            onValue(ref(db, 'uid_requests'), snap => {
                let container = document.getElementById('devRequestsContainer'); let countBadge = document.getElementById('devReqCount'); container.innerHTML = "";
                if(!snap.exists()) { countBadge.innerText = "0"; return; }
                let count = 0; let reqHtml = "";
                snap.forEach(child => {
                    count++; let data = child.val();
                    let urgentTag = data.urgent ? `<div class="urgent-tag">🔴 URGENT PING</div>` : '';
                    reqHtml += `<div class="req-card">${urgentTag}
                        <div style="font-family:'Share Tech Mono'; font-size:14px; color: #fff;">UID: <span style="color:var(--gold); font-weight:bold;">${data.uid}</span></div>
                        <div class="req-actions">
                            <button style="background:rgba(0,240,96,0.1); color:var(--green); border-color:var(--green);" onclick="approveUidDev('${data.uid}')">✅ APP</button>
                            <button style="background:rgba(255,26,26,0.1); color:var(--plasma); border-color:var(--plasma);" onclick="rejectUidDev('${data.uid}')">❌ REJ</button>
                        </div></div>`;
                });
                countBadge.innerText = count; container.innerHTML = reqHtml;
            });
        }

        window.approveUidDev = async (uid) => { await set(ref(db, 'approved_uids/' + uid), true); await remove(ref(db, 'uid_requests/' + uid)); };
        window.rejectUidDev = async (uid) => { await remove(ref(db, 'uid_requests/' + uid)); };

        function loadCurrentSettings() {
            onValue(ref(db, 'settings/active_link'), (snap) => { if(snap.exists()) document.getElementById('gameLinkInput').value = snap.val(); });
            onValue(ref(db, 'settings/maintenance'), (snap) => {
                let isMaint = snap.exists() ? snap.val() : false;
                document.getElementById('maintToggle').checked = isMaint;
                let badge = document.getElementById('statusBadge');
                if(isMaint) { badge.innerText = "OFFLINE"; badge.className = "status-badge status-offline"; } 
                else { badge.innerText = "ONLINE"; badge.className = "status-badge status-online"; }
            });
        }

        window.saveGameLink = async () => { await set(ref(db, 'settings/active_link'), document.getElementById('gameLinkInput').value.trim()); alert("LINK UPDATED!"); };
        window.updateMaintenance = async () => { await set(ref(db, 'settings/maintenance'), document.getElementById('maintToggle').checked); };
    </script>
</body>
</html>
