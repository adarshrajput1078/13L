<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIKKIM | GOD MODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Rajdhani:wght@700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #04040a; --bg-panel: #0a0a14; --primary: #8b5cf6; --red: #ef4444; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #1e1e2d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .card { background: var(--bg-panel); border: 1px solid var(--primary); padding: 40px; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 0 10px 40px rgba(139, 92, 246, 0.2); }
        h2 { font-family: 'Rajdhani'; font-size: 32px; text-align: center; margin-bottom: 30px; color: var(--primary);}
        
        input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none; margin-bottom: 20px; font-family: 'Inter';}
        button { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 20px; font-family: 'Inter';}
        
        .switch-container { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; border: 1px solid var(--red); }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); border-radius: 34px; transition: .4s;}
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; border-radius: 50%; transition: .4s;}
        input:checked + .slider { background-color: var(--red); }
        input:checked + .slider:before { transform: translateX(24px); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card" id="loginBox">
        <h2>DEVELOPER LOGIN</h2>
        <input type="password" id="pass" placeholder="ENTER PIN (ROCKYDEV)" style="text-align:center; letter-spacing:3px;">
        <button onclick="login()">AUTHORIZE</button>
    </div>

    <div class="card hidden" id="devBox">
        <h2>SYSTEM CORE</h2>
        
        <div style="margin-bottom: 30px;">
            <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px;">UPDATE GAME URL</p>
            <input type="text" id="gameLink" placeholder="https://sikkim.com">
            <button onclick="saveLink()" style="background: var(--text-main); color: #000;">UPDATE LINK</button>
        </div>

        <div class="switch-container">
            <span style="color: var(--red); font-weight: bold; font-size: 14px;">GLOBAL KILL SWITCH<br><span style="font-size: 10px; color: var(--text-muted); font-weight: normal;">Activates Maintenance Screen</span></span>
            <label class="switch"><input type="checkbox" id="maintToggle" onchange="toggleMaint()"><span class="slider"></span></label>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ apiKey: "AIzaSyBFdvXN8SAy77EDQp5HNykO5z2Wa0W8sb0", authDomain: "bdgrocky.firebaseapp.com", databaseURL: "https://bdgrocky-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "bdgrocky" });
        const db = getDatabase(app);

        window.login = () => { if(document.getElementById('pass').value === "ROCKYDEV") { document.getElementById('loginBox').classList.add('hidden'); document.getElementById('devBox').classList.remove('hidden'); init(); } else alert("Wrong PIN"); };

        function init() {
            onValue(ref(db, 'settings/link_sikkim'), s => { if(s.exists()) document.getElementById('gameLink').value = s.val(); });
            onValue(ref(db, 'settings/maintenance'), s => { document.getElementById('maintToggle').checked = s.exists() ? s.val() : false; });
        }

        window.saveLink = async () => { await set(ref(db, 'settings/link_sikkim'), document.getElementById('gameLink').value); alert("Link Updated!"); };
        window.toggleMaint = async () => { await set(ref(db, 'settings/maintenance'), document.getElementById('maintToggle').checked); };
    </script>
</body>
</html>
